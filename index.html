    <!-- ✅ FIX 1: Fonts — preconnect only, NO @import in CSS (সেটা render-blocking ছিল)
         font-display: optional — fonts miss করলে fallback use করবে, layout shift হবে না -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Non-render-blocking font load:
      media="print" → onload → media='all'
      এই pattern টা fonts কে critical path থেকে বের করে দেয়
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600&family=Poppins:wght@400;500;600&display=optional"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600&family=Poppins:wght@400;500;600&display=optional"
      />
    </noscript>

    <!-- ✅ FIX 2: LCP preload — Banner এর first image HTML এ discoverable করা
         Lighthouse এর "Request is not discoverable in initial document" fix করবে -->
    <link
      rel="preload"
      as="image"
      href="https://res.cloudinary.com/dltlnoi9z/image/upload/f_webp,q_auto,w_1024/v1776204517/banner02_wo7t1v.png"
      imagesrcset="

      "
      imagesizes="100vw"
      fetchpriority="high"
    />
