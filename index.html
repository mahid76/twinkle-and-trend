		<!--
      ✅ LOCAL FONT PRELOAD
      ✅ CLS FIX: Didot-Bold preload ADDED here.
      Without preloading Didot, the browser paints the logo in a
      fallback font first, then swaps to Didot when it loads →
      logo text shifts → CLS score increases.
      Preloading ensures Didot is ready before first paint → no swap shift.

      Order matters: most-critical fonts first.
      → Didot (logo, visible in navbar immediately)
      → Poppins Regular (body text, everywhere)
      → Poppins Medium/SemiBold/Bold (buttons, headings)
      → Playfair Display (section headings)
      crossorigin is required for woff2 preload.
    -->
		<!-- ✅ NEW: Didot preload (logo font — was causing navbar CLS) -->
		<link
			rel="preload"
			href="/fonts/Didot-Bold.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<link
			rel="preload"
			href="/fonts/poppins-regular.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<link

		<link

		/>

		<!-- ✅ LCP Banner preload — URLs EXACTLY match clImg(SLIDES[0].src, {width:N, quality:"auto"})
		     clImg strips existing transforms (q_auto/f_auto) then rebuilds: f_webp,q_auto,w_{N}
		     href = clImg(src, {width:1200}) = middle width (OptimizedImage default src)
		     imagesrcset = clSrcSet(src, [768,1200,1920], "auto") exact output
		     imagesizes = SIZES.banner = "100vw"
		     All 3 must match img tag exactly → browser gets cache hit = "discoverable" ✅ -->
		<link
			rel="preload"
			as="image"
			href="https://res.cloudinary.com/dltlnoi9z/image/upload/f_webp,q_auto,w_1200/v1776624340/banner01_zmtlth.jpg"
			imagesrcset="
				https://res.cloudinary.com/dltlnoi9z/image/upload/f_webp,q_auto,w_768/v1776624340/banner01_zmtlth.jpg 768w,
				https://res.cloudinary.com/dltlnoi9z/image/upload/f_webp,q_auto,w_1200/v1776624340/banner01_zmtlth.jpg 1200w,
				https://res.cloudinary.com/dltlnoi9z/image/upload/f_webp,q_auto,w_1920/v1776624340/banner01_zmtlth.jpg 1920w
			"
			imagesizes="100vw"
			fetchpriority="high"
		/>
